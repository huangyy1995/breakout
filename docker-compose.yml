version: '3.8'

services:
  breakout:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  # AI WebSocket relay server
  ai-server:
    build:
      context: ./ai-server
      dockerfile: Dockerfile
    ports:
      - "8765:8765"
    restart: unless-stopped
    volumes:
      - ./ai-server/checkpoints:/app/checkpoints
      - ./ai-server/runs:/app/runs
    command: python ws_server.py

  # AI trainer (run manually or via docker compose run)
  # Usage: docker compose run trainer python train.py --agent dqn --episodes 5000 --headless
  trainer:
    build:
      context: ./ai-server
      dockerfile: Dockerfile
    depends_on:
      - ai-server
      - breakout
    volumes:
      - ./ai-server/checkpoints:/app/checkpoints
      - ./ai-server/runs:/app/runs
    command: >
      python train.py
        --agent dqn
        --episodes 10000
        --headless
        --ws-url ws://ai-server:8765
    profiles:
      - training
